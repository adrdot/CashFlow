version: 2

updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      aspire:
        patterns:
          - 'Aspire.*'
          - 'Microsoft.Extensions.*'
      aws:
        patterns:
          - 'AWSSDK.*'
          - 'Amazon.*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
