name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: |
          dotnet tool restore
          dotnet restore Aspire.CashFlow.slnx

      - name: Format check
        run: dotnet csharpier --check .

      - name: Build
        run: dotnet build Aspire.CashFlow.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Aspire.CashFlow.slnx --no-build --configuration Release --verbosity normal

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Security audit
        shell: pwsh
        run: ./scripts/security-audit.ps1 -FailOnPackageSeverity high
