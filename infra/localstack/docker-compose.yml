services:
  localstack:
    container_name: cashflow-localstack
    image: localstack/localstack:latest
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      SERVICES: secretsmanager,kms,sns,sqs,cloudformation,cloudwatch,logs
      DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
      LOCALSTACK_HOST: host.docker.internal
      GATEWAY_LISTEN: 0.0.0.0:4566
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:4566/_localstack/health | grep -q '\"cloudwatch\": \"available\"\\|\"cloudwatch\": \"running\"' || curl -sf http://127.0.0.1:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 10s
