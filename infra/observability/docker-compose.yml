services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: cashflow-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:8889:8889"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPIRE_OTLP_ENDPOINT: ${ASPIRE_OTLP_ENDPOINT:-https://host.docker.internal:21119}
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro

  yace:
    image: quay.io/prometheuscommunity/yet-another-cloudwatch-exporter:v0.65.0
    container_name: cashflow-yace
    command:
      - --config.file=/config/config.yml
      - --listen-address=0.0.0.0:5000
    ports:
      - "127.0.0.1:5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://host.docker.internal:4566}
    volumes:
      - ./yace/config.yml:/config/config.yml:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: cashflow-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./generated/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:11.3.0
    container_name: cashflow-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - yace
